<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e9e8e3">
<title>Variante 2 · Espresso — Der eine Trichter</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#e9e8e3;
    --ivory:#f4eee3;
    --warm:#d8cfc2;
    --warm-muted:#b5aa94;
    --gold:#d7b98a;
    --gold-deep:#8f7448;
    --gold-cap:#c9ad7d;
    --terra-glow:#efa67d;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  html{overflow-x:hidden}
  body{
    background:var(--cream);color:#1f1c1c;min-height:100dvh;overflow-x:hidden;
    font-family:"Inter",-apple-system,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  /* Papierkorn — bewusst kaum sichtbar */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55;
    background-image:
      repeating-linear-gradient(0deg,rgba(31,28,28,.013) 0 1px,transparent 1px 3px),
      repeating-linear-gradient(90deg,rgba(31,28,28,.010) 0 1px,transparent 1px 4px)}

  .wrap{position:relative;z-index:1;max-width:420px;margin:0 auto;
    padding:calc(8px + env(safe-area-inset-top)) 10px calc(30px + env(safe-area-inset-bottom))}

  /* ——— slim page header ——— */
  .page-head{display:flex;align-items:center;gap:14px;padding:18px 6px 16px}
  .page-head::before,.page-head::after{content:"";flex:1;height:1px;
    background:linear-gradient(90deg,transparent,#cbbda4);}
  .page-head::after{background:linear-gradient(90deg,#cbbda4,transparent)}
  .page-head span{font-size:12px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;
    color:#8f7448;white-space:nowrap}

  /* ——— the espresso stage ——— */
  .stage-card{
    background:linear-gradient(168deg,#241f1c 0%,#1a1715 78%);
    border:1px solid rgba(215,185,138,.22);
    border-radius:24px;
    box-shadow:
      inset 0 1px 0 rgba(244,238,227,.07),
      0 2px 6px rgba(24,18,12,.16),
      0 18px 44px rgba(24,18,12,.30),
      0 36px 90px rgba(24,18,12,.26);
    padding:24px 8px 16px;
    overflow:hidden;position:relative;
  }
  /* faint gilded breath along the top edge */
  .stage-card::before{content:"";position:absolute;top:0;left:36px;right:36px;height:2px;
    border-radius:0 0 3px 3px;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(215,185,138,.55) 30%,rgba(215,185,138,.55) 70%,transparent)}

  .card-head{padding:0 16px 14px;text-align:center}
  .card-head .eyebrow{display:block;font-size:11px;font-weight:700;letter-spacing:.32em;
    text-transform:uppercase;color:var(--gold-cap);margin-bottom:6px}
  .card-head h1{margin:0;font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;
    font-size:27px;line-height:1.1;color:var(--ivory)}

  .stage-card svg{width:100%;height:auto;display:block}
  svg text{font-family:"Inter",-apple-system,sans-serif}

  /* SVG typography */
  .cap{fill:var(--gold-cap);font-size:13px;font-weight:700;letter-spacing:.26em}
  .chip-lab{fill:#ece4d4;font-size:13px;font-weight:600}
  .chip-num{font-family:"Cormorant Garamond",Georgia,serif;font-weight:700;fill:var(--gold);
    font-variant-numeric:lining-nums tabular-nums}
  .stage-num{font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;fill:var(--ivory);
    font-variant-numeric:lining-nums tabular-nums}
  .stage-lab{fill:#ddd3c4;font-size:14px;font-weight:600}
  .chev{fill:var(--gold);font-size:17px;font-weight:600}
  .badge-t{fill:var(--terra-glow);font-size:13px;font-weight:700;letter-spacing:.02em}
  .tile-num{font-family:"Cormorant Garamond",Georgia,serif;font-weight:700;fill:var(--ivory);
    font-variant-numeric:lining-nums tabular-nums}
  .tile-sub{fill:var(--warm-muted);font-size:13px;font-weight:500}
  .foot{fill:var(--warm-muted);font-size:13.5px}

  /* light-paths + particles */
  .link{stroke:var(--gold);stroke-width:1.2;fill:none;opacity:.5;stroke-linecap:round}
  .p-halo{fill:url(#dotGlow)}
  .p-core{fill:#f6e3b8}

  /* tappable rows / chips / tiles — hover & press via opacity only */
  .tap{cursor:pointer;touch-action:manipulation;outline:none}
  .tap .hit{fill:#f4eee3;opacity:0;transition:opacity .18s ease;stroke:var(--gold);stroke-opacity:0}
  .tap:hover .hit{opacity:.05}
  .tap:active .hit{opacity:.09}
  .tap:focus-visible .hit{opacity:.07;stroke-opacity:.7;stroke-width:1.2}

  /* funnel glow breathing */
  .glow{opacity:.45;animation:breathe 8s ease-in-out infinite alternate}
  @keyframes breathe{from{opacity:.38}to{opacity:.58}}

  /* shimmer sweep across the gold */
  .shimmer{animation:sweep 9s ease-in-out infinite}
  @keyframes sweep{0%{transform:translateX(0)}62%{transform:translateX(580px)}100%{transform:translateX(580px)}}

  /* feedback loop — dotted gold, slow upward crawl + pulse */
  .fb-arc{stroke:#cfa86c;stroke-width:1.2;fill:none;stroke-linecap:round;
    stroke-dasharray:.1 7.1;
    animation:fbFlow 6s linear infinite,fbPulse 5s ease-in-out infinite alternate}
  @keyframes fbFlow{to{stroke-dashoffset:-72}}
  @keyframes fbPulse{from{opacity:.32}to{opacity:.62}}
  .fb-tip{stroke:#cfa86c;stroke-width:1.3;fill:none;stroke-linecap:round;opacity:.55}

  /* stockt badge — slow ember pulse on the glow halo only */
  .ember{animation:emberPulse 3.6s ease-in-out infinite alternate}
  @keyframes emberPulse{from{opacity:.14}to{opacity:.46}}

  /* gentle one-time entrance */
  .fade{opacity:0;animation:fadeUp .8s cubic-bezier(.22,.7,.3,1) both}
  .fade.d1{animation-delay:.08s}.fade.d2{animation-delay:.26s}
  .fade.d3{animation-delay:.44s}.fade.d4{animation-delay:.6s}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  @media (prefers-reduced-motion: reduce){
    .p-dot{display:none}
    .glow,.shimmer,.fb-arc,.ember,.fade{animation:none}
    .fade{opacity:1;transform:none}
    .tap .hit{transition:none}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="page-head"><span>Variante 2 · Espresso</span></header>

  <section class="stage-card" aria-label="Der eine Trichter — Patientenstrom">
    <div class="card-head">
      <span class="eyebrow">Patientenstrom</span>
      <h1>Der eine Trichter</h1>
    </div>

    <svg viewBox="0 0 390 644" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="Trichter: fünf Quellen fließen in drei Stufen, daraus drei Ergebnisse; Verlustgründe fließen zurück in die Quellen">
      <defs>
        <linearGradient id="goldFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#d7b98a" stop-opacity=".30"/>
          <stop offset=".55" stop-color="#c4a06a" stop-opacity=".38"/>
          <stop offset="1" stop-color="#8f7448" stop-opacity=".52"/>
        </linearGradient>
        <linearGradient id="seamGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#f0ddb6" stop-opacity="0"/>
          <stop offset=".5" stop-color="#f0ddb6" stop-opacity=".85"/>
          <stop offset="1" stop-color="#f0ddb6" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="tileTop" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#dcc08c" stop-opacity="0"/>
          <stop offset=".5" stop-color="#dcc08c" stop-opacity=".9"/>
          <stop offset="1" stop-color="#dcc08c" stop-opacity="0"/>
        </linearGradient>
        <linearGradient id="shimmerGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#f4e3bd" stop-opacity="0"/>
          <stop offset=".5" stop-color="#f4e3bd" stop-opacity=".13"/>
          <stop offset="1" stop-color="#f4e3bd" stop-opacity="0"/>
        </linearGradient>
        <radialGradient id="dotGlow">
          <stop offset="0" stop-color="#f4dfae" stop-opacity=".9"/>
          <stop offset=".45" stop-color="#e3bf80" stop-opacity=".32"/>
          <stop offset="1" stop-color="#e3bf80" stop-opacity="0"/>
        </radialGradient>
        <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
          <feGaussianBlur stdDeviation="12"/>
        </filter>
        <filter id="seamBlur" x="-30%" y="-900%" width="160%" height="1900%">
          <feGaussianBlur stdDeviation="2.6"/>
        </filter>
        <clipPath id="funClip">
          <path d="M64,232 L326,232 L252,474 L138,474 Z"/>
        </clipPath>
      </defs>

      <!-- ======== QUELLEN ======== -->
      <g class="fade d1">
        <text class="cap" x="195" y="18" text-anchor="middle">QUELLEN</text>

        <!-- light-paths: sources → funnel -->
        <path class="link" d="M70,88 C30,100 14,126 14,152 C14,188 58,212 108,228"/>
        <path class="link" d="M195,88 C195,135 195,190 195,229"/>
        <path class="link" d="M320,88 C360,100 376,126 376,152 C376,188 332,212 282,228"/>
        <path class="link" d="M117,154 C117,182 131,210 147,228"/>
        <path class="link" d="M273,154 C273,182 259,210 243,228"/>

        <!-- chips, row 1 -->
        <g class="tap" role="button" tabindex="0">
          <title>Zuweiser: Krankenhäuser</title>
          <rect x="12" y="30" width="116" height="58" rx="13"
                fill="rgba(244,238,227,.035)" stroke="#8f7448" stroke-width="1"/>
          <text class="chip-lab" x="70" y="52" text-anchor="middle">Krankenhäuser</text>
          <text class="chip-num" x="70" y="79" text-anchor="middle" font-size="24">6</text>
          <rect class="hit" x="12" y="30" width="116" height="58" rx="13"/>
        </g>
        <g class="tap" role="button" tabindex="0">
          <title>Zuweiser: Privatpraxen</title>
          <rect x="137" y="30" width="116" height="58" rx="13"
                fill="rgba(244,238,227,.035)" stroke="#8f7448" stroke-width="1"/>
          <text class="chip-lab" x="195" y="52" text-anchor="middle">Privatpraxen</text>
          <text class="chip-num" x="195" y="79" text-anchor="middle" font-size="24">2</text>
          <rect class="hit" x="137" y="30" width="116" height="58" rx="13"/>
        </g>
        <g class="tap" role="button" tabindex="0">
          <title>Zuweiser: Hausärzte</title>
          <rect x="262" y="30" width="116" height="58" rx="13"
                fill="rgba(244,238,227,.035)" stroke="#8f7448" stroke-width="1"/>
          <text class="chip-lab" x="320" y="52" text-anchor="middle">Hausärzte</text>
          <text class="chip-num" x="320" y="79" text-anchor="middle" font-size="24">1</text>
          <rect class="hit" x="262" y="30" width="116" height="58" rx="13"/>
        </g>

        <!-- chips, row 2 -->
        <g class="tap" role="button" tabindex="0">
          <title>Bestand: Altpatienten</title>
          <rect x="46" y="96" width="142" height="58" rx="13"
                fill="rgba(244,238,227,.035)" stroke="#8f7448" stroke-width="1"/>
          <text class="chip-lab" x="117" y="118" text-anchor="middle">Altpatienten</text>
          <text class="chip-num" x="117" y="145" text-anchor="middle" font-size="24">4</text>
          <rect class="hit" x="46" y="96" width="142" height="58" rx="13"/>
        </g>
        <g class="tap" role="button" tabindex="0">
          <title>Zuweiser: Premium-Netzwerke</title>
          <rect x="202" y="96" width="142" height="58" rx="13"
                fill="rgba(244,238,227,.035)" stroke="#8f7448" stroke-width="1"/>
          <text class="chip-lab" x="273" y="118" text-anchor="middle">Premium-Netzwerke</text>
          <text class="chip-num" x="273" y="145" text-anchor="middle" font-size="24">1</text>
          <rect class="hit" x="202" y="96" width="142" height="58" rx="13"/>
        </g>
      </g>

      <!-- ======== DER TRICHTER — luminous gold on the dark stage ======== -->
      <g class="fade d2">
        <!-- outer glow: blurred duplicate -->
        <path class="glow" d="M64,232 L326,232 L252,474 L138,474 Z"
              fill="#b8945c" filter="url(#softBlur)"/>
        <!-- the funnel body -->
        <path d="M64,232 L326,232 L252,474 L138,474 Z"
              fill="url(#goldFill)" stroke="#d7b98a" stroke-opacity=".55" stroke-width="1"/>
        <!-- slow shimmer sweep -->
        <g clip-path="url(#funClip)">
          <rect class="shimmer" x="-160" y="230" width="130" height="246" fill="url(#shimmerGrad)"/>
        </g>

        <!-- light seams: entry + stage separators -->
        <line x1="64" y1="232" x2="326" y2="232" stroke="url(#seamGrad)" stroke-width="1.4"/>
        <line x1="89" y1="312" x2="301" y2="312" stroke="url(#seamGrad)" stroke-width="3.4"
              opacity=".5" filter="url(#seamBlur)"/>
        <line x1="89" y1="312" x2="301" y2="312" stroke="url(#seamGrad)" stroke-width="1.1"/>
        <line x1="113" y1="392" x2="277" y2="392" stroke="url(#seamGrad)" stroke-width="3.4"
              opacity=".5" filter="url(#seamBlur)"/>
        <line x1="113" y1="392" x2="277" y2="392" stroke="url(#seamGrad)" stroke-width="1.1"/>

        <!-- Stufe 1 · neu & kontaktiert -->
        <text class="stage-num" x="152" y="278" text-anchor="end" font-size="44">4</text>
        <text class="stage-lab" x="164" y="274">neu &amp; kontaktiert <tspan class="chev" dy="1">›</tspan></text>
        <g>
          <rect x="153" y="289" width="84" height="22" rx="11"
                fill="rgba(168,84,63,.20)" stroke="rgba(239,166,125,.35)" stroke-width="1"/>
          <circle cx="167" cy="300" r="3" fill="#e6794f"/>
          <circle class="ember" cx="167" cy="300" r="6.5" fill="#e6794f" opacity=".28" filter="url(#seamBlur)"/>
          <text class="badge-t" x="177" y="304.5">1 stockt</text>
        </g>

        <!-- Stufe 2 · Aufnahme geplant -->
        <text class="stage-num" x="138" y="368" text-anchor="end" font-size="44">1</text>
        <text class="stage-lab" x="150" y="364">Aufnahme geplant <tspan class="chev" dy="1">›</tspan></text>

        <!-- Stufe 3 · in Klärung -->
        <text class="stage-num" x="158" y="438" text-anchor="end" font-size="44">4</text>
        <text class="stage-lab" x="170" y="434">in Klärung <tspan class="chev" dy="1">›</tspan></text>
        <g>
          <rect x="153" y="447" width="84" height="22" rx="11"
                fill="rgba(168,84,63,.20)" stroke="rgba(239,166,125,.35)" stroke-width="1"/>
          <circle cx="167" cy="458" r="3" fill="#e6794f"/>
          <circle class="ember" cx="167" cy="458" r="6.5" fill="#e6794f" opacity=".28" filter="url(#seamBlur)"/>
          <text class="badge-t" x="177" y="462.5">1 stockt</text>
        </g>

        <!-- tappable stage rows (≥44px hit areas) -->
        <g class="tap" role="button" tabindex="0">
          <title>Fälle: neu und kontaktiert anzeigen</title>
          <rect class="hit" x="80" y="234" width="230" height="76" rx="12"/>
        </g>
        <g class="tap" role="button" tabindex="0">
          <title>Geplante Aufnahmen anzeigen</title>
          <rect class="hit" x="102" y="314" width="186" height="76" rx="12"/>
        </g>
        <g class="tap" role="button" tabindex="0">
          <title>Fälle in Klärung anzeigen</title>
          <rect class="hit" x="124" y="394" width="142" height="78" rx="12"/>
        </g>
      </g>

      <!-- ======== ERGEBNIS ======== -->
      <g class="fade d3">
        <!-- light-paths: funnel → results -->
        <path class="link" d="M195,476 C188,494 112,506 76,516"/>
        <path class="link" d="M195,476 L195,516"/>
        <path class="link" d="M195,476 C202,494 278,506 314,516"/>

        <!-- gilded tiles -->
        <g class="tap" role="button" tabindex="0">
          <title>Auswertung: Aufnahmen</title>
          <rect x="12" y="520" width="116" height="64" rx="13"
                fill="rgba(244,238,227,.04)" stroke="rgba(215,185,138,.22)" stroke-width="1"/>
          <rect x="22" y="519.4" width="96" height="2" rx="1" fill="url(#tileTop)"/>
          <text class="tile-num" x="70" y="552" text-anchor="middle" font-size="27">2</text>
          <text class="tile-sub" x="70" y="572" text-anchor="middle">Aufnahmen</text>
          <rect class="hit" x="12" y="520" width="116" height="64" rx="13"/>
        </g>
        <g class="tap" role="button" tabindex="0">
          <title>Auswertung: Privatauslastung</title>
          <rect x="137" y="520" width="116" height="64" rx="13"
                fill="rgba(244,238,227,.04)" stroke="rgba(215,185,138,.22)" stroke-width="1"/>
          <rect x="147" y="519.4" width="96" height="2" rx="1" fill="url(#tileTop)"/>
          <text class="tile-num" x="195" y="552" text-anchor="middle" font-size="27">78<tspan font-size="16" fill="#c9ad7d" dx="3">%</tspan></text>
          <text class="tile-sub" x="195" y="572" text-anchor="middle">Privatauslastung</text>
          <rect class="hit" x="137" y="520" width="116" height="64" rx="13"/>
        </g>
        <g class="tap" role="button" tabindex="0">
          <title>Auswertung: Verloren und gelernt</title>
          <rect x="262" y="520" width="116" height="64" rx="13"
                fill="rgba(244,238,227,.04)" stroke="rgba(215,185,138,.22)" stroke-width="1"/>
          <rect x="272" y="519.4" width="96" height="2" rx="1" fill="url(#tileTop)"/>
          <text class="tile-num" x="320" y="552" text-anchor="middle" font-size="27">1</text>
          <text class="tile-sub" x="320" y="572" text-anchor="middle">Verloren · gelernt</text>
          <rect class="hit" x="262" y="520" width="116" height="64" rx="13"/>
        </g>
      </g>

      <!-- ======== feedback loop + footnote ======== -->
      <g class="fade d4">
        <path class="fb-arc" d="M338,512 C386,446 382,176 352,90"/>
        <path class="fb-tip" d="M346,102 L352,89 L359,101"/>
        <text class="foot" x="195" y="612" text-anchor="middle">
          <tspan x="195" dy="0">Verlustgründe und Rückmeldungen</tspan>
          <tspan x="195" dy="19">fließen zurück in die Quellen.</tspan>
        </text>
      </g>

      <!-- ======== glowing particles ======== -->
      <g class="p-dot fade d4">
        <g>
          <circle class="p-halo" cx="70" cy="88" r="6"/>
          <circle class="p-core" cx="70" cy="88" r="2"/>
          <animateMotion dur="8s" repeatCount="indefinite"
            path="M0,0 C-40,12 -56,38 -56,64 C-56,100 -12,124 38,140"/>
        </g>
        <g opacity=".85">
          <circle class="p-halo" cx="195" cy="88" r="6"/>
          <circle class="p-core" cx="195" cy="88" r="2"/>
          <animateMotion dur="7s" begin="3s" repeatCount="indefinite"
            path="M0,0 C0,50 0,100 0,141"/>
        </g>
        <g opacity=".8">
          <circle class="p-halo" cx="273" cy="154" r="6"/>
          <circle class="p-core" cx="273" cy="154" r="2"/>
          <animateMotion dur="9s" begin="1.2s" repeatCount="indefinite"
            path="M0,0 C0,26 -14,56 -30,74"/>
        </g>
        <g opacity=".85">
          <circle class="p-halo" cx="195" cy="476" r="6"/>
          <circle class="p-core" cx="195" cy="476" r="2"/>
          <animateMotion dur="8.5s" begin="4.5s" repeatCount="indefinite"
            path="M0,0 C-7,18 -85,29 -121,42"/>
        </g>
      </g>
    </svg>
  </section>

</div>
</body>
</html>
